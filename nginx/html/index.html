<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Nginx!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: white;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #4CAF50; }
        .status { 
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        .healthy { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Nginx!</h1>
        <p>Multi-container app running with Docker Compose</p>
        <div class="status">
            API Status: <span id="api-status">Checking...</span>
        </div>
    </div>

    <script>
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('api-status').innerHTML = '✅ ' + data.status;
                document.getElementById('api-status').className = 'healthy';
            })
            .catch(() => {
                document.getElementById('api-status').innerHTML = '❌ Unreachable';
                document.getElementById('api-status').className = 'error';
            });
    </script>
</body>
</html>
