<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Nginx!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.9);
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #4CAF50;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        .healthy {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .deploy-info {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to Nginx!</h1>
        <p>This multi-container application is running on <strong>Railway</strong> with Docker Compose.</p>
        
        <div class="status">
            <p>📡 API Status: <span id="api-status" class="checking">Checking...</span></p>
            <p>🐳 Container: <span id="container-info">Loading...</span></p>
        </div>
        
        <div class="deploy-info">
            <p>✅ Deployed from GitHub to Railway</p>
            <p>🔧 Multi-container: Nginx + Flask API</p>
        </div>
    </div>

    <script>
        async function checkAPI() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                document.getElementById('api-status').innerHTML = '✅ ' + data.status;
                document.getElementById('api-status').className = 'healthy';
                document.getElementById('container-info').innerHTML = '🐳 ' + data.container;
            } catch (error) {
                document.getElementById('api-status').innerHTML = '❌ API unreachable';
                document.getElementById('api-status').className = 'error';
                document.getElementById('container-info').innerHTML = '⚠️ Connection failed';
            }
        }
        
        checkAPI();
        setInterval(checkAPI, 5000);
    </script>
</body>
</html>
